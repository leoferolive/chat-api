apiVersion: v1
kind: ConfigMap
metadata:
  name: chat-api-config
  namespace: chat-api-dev
data:
  ENV: "dev"
  ALLOWED_ORIGINS: "https://leoferolive-dev.com.br,http://localhost:5173"
  WIKI_DIR: "/wiki"
  DB_PATH: "/data/chat.sqlite"
  TURNSTILE_DISABLED: "false"
  SESSION_TTL_SECONDS: "3600"
  RATE_LIMIT_PER_IP: "30/5minutes"
  DAILY_LLM_CALL_LIMIT: "200"
  LLM_PROVIDERS: "gemini/gemini-2.5-flash,openrouter/anthropic/claude-haiku-4.5,zai/glm-4.7-flash"
  ZAI_BASE_URL: "https://api.z.ai/api/paas/v4/"
  RETRIEVER_TOP_N: "5"
  WIKI_POLL_SECONDS: "60"
