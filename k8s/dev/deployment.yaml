apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-api-dev
  namespace: chat-api-dev
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: chat-api-dev
  template:
    metadata:
      labels:
        app: chat-api-dev
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      volumes:
        - name: wiki
          persistentVolumeClaim:
            claimName: chat-api-wiki
        - name: db
          persistentVolumeClaim:
            claimName: chat-api-db
      initContainers:
        - name: wiki-prep
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              # Preparar subdir dedicado pro git-sync. Idempotente:
              # se /wiki/repo já existe (gerado pelo git-sync em runs
              # anteriores), preservamos. Limpamos resíduos do init
              # antigo wiki-clone que viviam em /wiki/.
              mkdir -p /wiki/repo
              for entry in /wiki/.git /wiki/wiki /wiki/AGENTS.md /wiki/README.md /wiki/raw /wiki/.gitignore; do
                if [ -e "$entry" ]; then
                  echo "[wiki-prep] removing legacy $entry"
                  rm -rf "$entry"
                fi
              done
              # git-sync exige UID 65533 dono do root.
              chown -R 65533:65533 /wiki/repo
          volumeMounts:
            - name: wiki
              mountPath: /wiki
          securityContext:
            runAsUser: 0
      containers:
        - name: git-sync
          image: registry.k8s.io/git-sync/git-sync:v4.2.4
          args:
            - --repo=https://github.com/leoferolive/leoferolive-wiki.git
            - --ref=main
            - --depth=1
            - --period=60s
            - --root=/wiki/repo
            - --link=current
            - --error-file=.git-sync-error
            - --http-bind=:9102
            - --max-failures=3
            - -v=2
          volumeMounts:
            - name: wiki
              mountPath: /wiki
          ports:
            - containerPort: 9102
              name: git-sync-http
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
          securityContext:
            runAsUser: 65533
            runAsNonRoot: true
            allowPrivilegeEscalation: false
        - name: chat-api-dev
          image: ghcr.io/leoferolive/chat-api-dev:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: chat-api-config
            - secretRef:
                name: chat-api-secrets
          volumeMounts:
            - name: wiki
              mountPath: /wiki
              readOnly: true
            - name: db
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 15
