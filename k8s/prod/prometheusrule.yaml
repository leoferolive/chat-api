apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: chat-api
  namespace: chat-api
  labels:
    app: chat-api
    release: kps
spec:
  groups:
    - name: chat-api.cost
      interval: 30s
      rules:
        - alert: ChatApiHighDailyTokens
          expr: sum(increase(chat_api_tokens_total{namespace="chat-api"}[24h])) > 500000
          for: 5m
          labels:
            severity: warning
            namespace: chat-api
          annotations:
            summary: "chat-api: tokens/24h acima de 500k"
            description: "Total nas últimas 24h: {{ $value | humanize }} tokens. Revisar dashboards."

        - alert: ChatApiCriticalDailyTokens
          expr: sum(increase(chat_api_tokens_total{namespace="chat-api"}[24h])) > 1000000
          for: 5m
          labels:
            severity: critical
            namespace: chat-api
          annotations:
            summary: "chat-api: tokens/24h acima de 1M (crítico)"
            description: "Total nas últimas 24h: {{ $value | humanize }} tokens. Custo de LLM elevado — investigar abuso ou aumentar limite."

        - alert: ChatApiCostGateHit
          expr: increase(chat_api_cost_gate_hits_total{namespace="chat-api"}[5m]) > 0
          for: 0m
          labels:
            severity: warning
            namespace: chat-api
          annotations:
            summary: "chat-api: cost gate atingido"
            description: "DAILY_LLM_CALL_LIMIT bloqueou requests nos últimos 5min ({{ $value | humanize }} bloqueios)."

        - alert: ChatApiCostBudgetExceeded
          # Disparado quando o gasto em USD nas últimas 24h passa do
          # orçamento configurado. Em prod, 10 USD/dia é o teto desejado.
          expr: sum(chat_api:cost_usd:increase24h{namespace="chat-api"}) > 10
          for: 10m
          labels:
            severity: warning
            namespace: chat-api
          annotations:
            summary: "chat-api: gasto LLM 24h > $10"
            description: "Gasto últimas 24h: ${{ $value | humanize }}. Revisar dashboards/Finops."

    - name: chat-api.quality
      interval: 60s
      rules:
        - alert: ChatApiQualityRegression
          # Avg score por critério caiu abaixo do SLO 3.5. Guarded com
          # at-least 5 evaluations p/ evitar fire em janela com pouco volume.
          # IMPORTANTE: filtros namespace="chat-api" em TODOS os selectors
          # — sem eles, o kps shared agregaria dev+prod e dev (volume baixo)
          # poderia dominar ou mascarar regressão real em prod.
          expr: |
            (
              sum by (criterion) (
                chat_api_judge_score_avg{namespace="chat-api"}
                  * chat_api_judge_evaluations_total{namespace="chat-api"}
              )
              /
              clamp_min(
                sum by (criterion) (chat_api_judge_evaluations_total{namespace="chat-api"}),
                1
              )
            ) < 3.5
              and
            sum by (criterion) (chat_api_judge_evaluations_total{namespace="chat-api"}) >= 5
          for: 30m
          labels:
            severity: warning
            namespace: chat-api
          annotations:
            summary: "chat-api: qualidade caiu em '{{ $labels.criterion }}'"
            description: "Score médio do critério {{ $labels.criterion }} caiu para {{ $value | humanize }} (SLO 3.5)."

    - name: chat-api.abuse
      interval: 30s
      rules:
        - alert: ChatApiHighChatRate
          expr: sum(rate(chat_api_chats_total{namespace="chat-api"}[5m])) * 60 > 30
          for: 5m
          labels:
            severity: warning
            namespace: chat-api
          annotations:
            summary: "chat-api: > 30 chats/min sustentado"
            description: "Taxa atual: {{ $value | humanize }} chats/min nos últimos 5min. Possível abuso."

    - name: chat-api.health
      interval: 30s
      rules:
        - alert: ChatApiHighErrorRate
          expr: |
            sum(rate(chat_api_chats_total{namespace="chat-api",status="error"}[5m]))
              /
            sum(rate(chat_api_chats_total{namespace="chat-api"}[5m])) > 0.05
          for: 5m
          labels:
            severity: warning
            namespace: chat-api
          annotations:
            summary: "chat-api: > 5% de erros"
            description: "Taxa de erro: {{ $value | humanizePercentage }} nos últimos 5min."

        - alert: ChatApiAllProvidersFailing
          # Guard with traffic > 0.01/s so an idle window (no chats at all) doesn't
          # let a single transient open-failure flip the alert to critical.
          expr: |
            sum(rate(chat_api_provider_failures_total{namespace="chat-api"}[5m])) > 0
              and
            sum(rate(chat_api_chats_total{namespace="chat-api",status="ok"}[5m])) == 0
              and
            sum(rate(chat_api_chats_total{namespace="chat-api"}[5m])) > 0.01
          for: 5m
          labels:
            severity: critical
            namespace: chat-api
          annotations:
            summary: "chat-api: todos os providers de LLM caídos"
            description: "Nenhum chat bem-sucedido nos últimos 5min e providers gerando falhas. Rotear tráfego ou investigar."

        - alert: ChatApiHighLatency
          expr: |
            histogram_quantile(0.95,
              sum by (le) (rate(chat_api_chat_duration_seconds_bucket{namespace="chat-api"}[5m]))
            ) > 10
          for: 10m
          labels:
            severity: warning
            namespace: chat-api
          annotations:
            summary: "chat-api: latência p95 > 10s"
            description: "p95: {{ $value | humanizeDuration }} nos últimos 5min."

        - alert: ChatApiPodNotReady
          # A premissa antiga ("namespace só tem pods do chat-api") quebrou
          # quando passamos a ter CronJobs (chat-api-judge, chat-api-rotate-session)
          # cujos pods naturalmente ficam Ready=False após terminar. O join com
          # kube_pod_status_phase{phase="Running"} restringe o alerta aos pods
          # que DEVERIAM estar Ready — Job pods em Succeeded/Failed somem do
          # critério em vez de paginar.
          expr: |
            kube_pod_status_ready{namespace="chat-api",condition="true"} == 0
              and on(namespace, pod)
            kube_pod_status_phase{namespace="chat-api",phase="Running"} == 1
          for: 5m
          labels:
            severity: critical
            namespace: chat-api
          annotations:
            summary: "chat-api: pod não-ready há 5min"
            description: "Pod {{ $labels.pod }} sem readiness — verificar logs e healthz."

        - alert: ChatApiPodRestarting
          expr: increase(kube_pod_container_status_restarts_total{namespace="chat-api",container="chat-api"}[15m]) > 3
          for: 0m
          labels:
            severity: warning
            namespace: chat-api
          annotations:
            summary: "chat-api: pod restartando frequentemente"
            description: "{{ $value | humanize }} restarts em 15min no pod {{ $labels.pod }}."

        - alert: ChatApiPodOOMKilled
          # `last_terminated_reason` mantém o motivo do último término por ~15min,
          # tempo suficiente para alertar mesmo após o pod reiniciar.
          # `for: 1m` amortece reaberturas durante rolling restart enquanto
          # o KSM ainda está republicando a série pós-resolve.
          expr: |
            kube_pod_container_status_last_terminated_reason{namespace="chat-api",container="chat-api",reason="OOMKilled"} == 1
          for: 1m
          labels:
            severity: critical
            namespace: chat-api
          annotations:
            summary: "chat-api: pod morto por OOMKilled"
            description: "Pod {{ $labels.pod }} foi terminado por OOM. Aumentar memory limit ou investigar leak."

        - alert: ChatApiPodCrashLooping
          expr: |
            kube_pod_container_status_waiting_reason{namespace="chat-api",container="chat-api",reason="CrashLoopBackOff"} == 1
          for: 5m
          labels:
            severity: critical
            namespace: chat-api
          annotations:
            summary: "chat-api: pod em CrashLoopBackOff"
            description: "Pod {{ $labels.pod }} em CrashLoopBackOff há 5min — verificar logs do container."

        - alert: ChatApiPodImagePullFailing
          expr: |
            kube_pod_container_status_waiting_reason{namespace="chat-api",container="chat-api",reason=~"ImagePullBackOff|ErrImagePull"} == 1
          for: 5m
          labels:
            severity: warning
            namespace: chat-api
          annotations:
            summary: "chat-api: falha ao puxar imagem"
            description: "Pod {{ $labels.pod }} com {{ $labels.reason }} há 5min — verificar tag/registry/credenciais."

        - alert: ChatApiPodMemoryNearLimit
          expr: |
            container_memory_working_set_bytes{namespace="chat-api",container="chat-api"}
              / on(namespace,pod,container)
            kube_pod_container_resource_limits{namespace="chat-api",container="chat-api",resource="memory"} > 0.85
          for: 10m
          labels:
            severity: warning
            namespace: chat-api
          annotations:
            summary: "chat-api: memória ≥ 85% do limit"
            description: "Pod {{ $labels.pod }} usando {{ $value | humanizePercentage }} do memory limit há 10min — risco de OOM."

        - alert: ChatApiPodCpuThrottling
          # Fração de períodos CFS efetivamente throttled — mais robusta que
          # threshold absoluto em segundos. Independe do valor de cpu.limit:
          # em pods com limit=500m, 0.5 s/s seria saturação; em limit=2,
          # apenas 25%. 25% dos períodos throttled é o ponto onde a app
          # claramente sente impacto na latência.
          expr: |
            rate(container_cpu_cfs_throttled_periods_total{namespace="chat-api",container="chat-api"}[5m])
              /
            rate(container_cpu_cfs_periods_total{namespace="chat-api",container="chat-api"}[5m]) > 0.25
          for: 10m
          labels:
            severity: warning
            namespace: chat-api
          annotations:
            summary: "chat-api: CPU throttling significativo"
            description: "Pod {{ $labels.pod }} com {{ $value | humanizePercentage }} dos períodos CFS throttled há 10min — aumentar cpu limit."

        - alert: ChatApiHighFallbackRate
          # > 30% das chamadas ativando o failover sustained 10min →
          # provider primário degradado (mesmo que o secundário esteja
          # cobrindo, o custo e a latência vão subir).
          expr: |
            sum(rate(chat_api_provider_failures_total{namespace="chat-api",phase!="open"}[10m]))
              /
            clamp_min(sum(rate(chat_api_chats_total{namespace="chat-api"}[10m])), 1e-9) > 0.3
          for: 10m
          labels:
            severity: warning
            namespace: chat-api
          annotations:
            summary: "chat-api: fallback rate > 30%"
            description: "{{ $value | humanizePercentage }} das chamadas estão caindo no provider de fallback. Investigar primário."
