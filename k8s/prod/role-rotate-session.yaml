apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: chat-api-rotator
  namespace: chat-api
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["chat-api-secrets"]
    verbs: ["get", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames: ["chat-api"]
    verbs: ["get", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments/status"]
    resourceNames: ["chat-api"]
    verbs: ["get"]
