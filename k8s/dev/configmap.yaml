apiVersion: v1
kind: ConfigMap
metadata:
  name: chat-api-config
  namespace: chat-api-dev
data:
  ENV: "dev"
  ALLOWED_ORIGINS: "https://leoferolive-dev.leoferolive.com.br,http://localhost:5173"
  WIKI_DIR: "/wiki"
  DB_PATH: "/data/chat.sqlite"
  # Turnstile turned off — the invisible widget hung on real browsers
  # without ever resolving (TrustedTypes-related interaction inside the
  # CF iframe). Rate limit + daily cost gate are sufficient guards for
  # a low-traffic personal portfolio. Revisit if abuse appears.
  TURNSTILE_DISABLED: "true"
  SESSION_TTL_SECONDS: "3600"
  RATE_LIMIT_PER_IP: "30/5minutes"
  DAILY_LLM_CALL_LIMIT: "200"
  # Dev exercises OpenRouter as the primary provider so we can validate
  # the integration independently of Gemini.
  LLM_PROVIDERS: "openrouter/deepseek/deepseek-v4-flash,openrouter/google/gemini-2.5-flash-lite,gemini/gemini-2.5-flash"
  ZAI_BASE_URL: "https://api.z.ai/api/coding/paas/v4/"
  RETRIEVER_TOP_N: "5"
  WIKI_POLL_SECONDS: "60"
