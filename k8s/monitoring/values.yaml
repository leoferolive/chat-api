# kube-prometheus-stack values — k3s single-node @ leo-ubuntu
#
# Install:
#   helm install kps prometheus-community/kube-prometheus-stack \
#     -n monitoring -f k8s/monitoring/values.yaml
#
# Upgrade:
#   helm upgrade kps prometheus-community/kube-prometheus-stack \
#     -n monitoring -f k8s/monitoring/values.yaml

fullnameOverride: kps

# k3s embeds these into the API server / kubelet — they don't expose
# scrape targets, so disable to avoid permanently-down targets.
kubeEtcd:
  enabled: false
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeProxy:
  enabled: false

defaultRules:
  create: true
  rules:
    etcd: false
    kubeControllerManager: false
    kubeProxy: false
    kubeSchedulerAlerting: false
    kubeSchedulerRecording: false

# ---- Prometheus -----------------------------------------------------------
prometheus:
  prometheusSpec:
    retention: 15d
    retentionSize: 8GiB
    scrapeInterval: 30s
    evaluationInterval: 30s
    # Pick up ServiceMonitor / PrometheusRule from any namespace as long as
    # they carry our release label. This is what lets the chat-api
    # ServiceMonitor (in ns chat-api) be discovered.
    serviceMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelector:
      matchLabels:
        release: kps
    ruleSelector:
      matchLabels:
        release: kps
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 2Gi

# ---- AlertManager ---------------------------------------------------------
alertmanager:
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 1Gi
    # Mounts /etc/alertmanager/secrets/alertmanager-telegram/{bot_token}
    secrets:
      - alertmanager-telegram
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi
  config:
    global:
      resolve_timeout: 5m
    route:
      receiver: telegram-warning
      group_by: ["alertname", "namespace", "severity"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        - matchers:
            - severity = "critical"
          receiver: telegram-critical
          repeat_interval: 1h
        - matchers:
            - alertname =~ "Watchdog|InfoInhibitor"
          receiver: "null"
    receivers:
      - name: "null"
      # Plain-text messages — descriptions in our PrometheusRule contain
      # raw "<", ">" and "%" chars. With parse_mode set, Telegram refuses
      # the message. Plain text avoids escape gymnastics entirely.
      - name: telegram-warning
        telegram_configs:
          - bot_token_file: /etc/alertmanager/secrets/alertmanager-telegram/bot_token
            chat_id: 475333823
            send_resolved: true
            message: |
              ⚠️ {{ .CommonLabels.alertname }} ({{ .CommonLabels.severity }})
              {{ range .Alerts }}
              {{ .Annotations.summary }}
              {{ .Annotations.description }}
              {{ end }}
      - name: telegram-critical
        telegram_configs:
          - bot_token_file: /etc/alertmanager/secrets/alertmanager-telegram/bot_token
            chat_id: 475333823
            send_resolved: true
            message: |
              🚨 {{ .CommonLabels.alertname }} (CRITICAL)
              {{ range .Alerts }}
              {{ .Annotations.summary }}
              {{ .Annotations.description }}
              {{ end }}

# ---- Grafana --------------------------------------------------------------
grafana:
  admin:
    existingSecret: grafana-admin
    userKey: admin-user
    passwordKey: admin-password
  defaultDashboardsTimezone: America/Sao_Paulo

  # External Postgres backend — replaces the bundled SQLite (which gave us
  # `database is locked` under concurrent writes and broke the dashboard
  # grid render at large viewports). DB and user provisioned out-of-band
  # in the shared `postgres.database` instance; password lives in the
  # `grafana-postgres` Secret as key GF_DATABASE_PASSWORD (Grafana picks
  # it up via env override of [database].password).
  grafana.ini:
    database:
      type: postgres
      host: postgres.database.svc.cluster.local:5432
      name: grafana
      user: grafana
      ssl_mode: disable
      max_open_conn: 30
      max_idle_conn: 5
  envFromSecret: grafana-postgres

  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: web
    hosts:
      - grafana.leoferolive.com.br
    path: /
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      searchNamespace: ALL
      provider:
        allowUiUpdates: true
    datasources:
      enabled: true
      searchNamespace: ALL

  # No SQLite, no need for the local PVC. The container still mounts an
  # emptyDir at /var/lib/grafana for plugin/cache scratch.
  persistence:
    enabled: false

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# ---- node-exporter / kube-state-metrics defaults are fine ----------------
prometheusOperator:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
