apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: chat-api
  namespace: chat-api-dev
  labels:
    app: chat-api-dev
    release: kps
spec:
  selector:
    matchLabels:
      app: chat-api-dev
  namespaceSelector:
    matchNames:
      - chat-api-dev
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
    - port: http
      path: /metrics-judge
      # Judge scores update at most every 10 min in dev — no value scraping
      # faster than once per minute.
      interval: 60s
      scrapeTimeout: 10s
