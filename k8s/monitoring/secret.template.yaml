# Template only — DO NOT apply this file. Create real Secrets out-of-band:
#
# Bot do Telegram para alertas (criado via @BotFather):
#   kubectl create secret generic alertmanager-telegram \
#     --namespace monitoring \
#     --from-literal=bot_token='123456:ABC-DEF...'
#
# Senha admin do Grafana:
#   kubectl create secret generic grafana-admin \
#     --namespace monitoring \
#     --from-literal=admin-user=admin \
#     --from-literal=admin-password=$(openssl rand -hex 16)
#
# Backend Postgres do Grafana (DB e user provisionados manualmente no
# postgres.database — ver README.md). A senha gerada vai por env override
# de [database].password via GF_DATABASE_PASSWORD:
#   kubectl create secret generic grafana-postgres \
#     --namespace monitoring \
#     --from-literal=GF_DATABASE_PASSWORD=$(openssl rand -hex 16)
#
# O chat_id do Telegram é configurado em values.yaml (não é segredo —
# é apenas o ID do chat onde os alertas serão entregues).
---
apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-telegram
  namespace: monitoring
type: Opaque
stringData:
  bot_token: "REPLACE_WITH_BOTFATHER_TOKEN"
---
apiVersion: v1
kind: Secret
metadata:
  name: grafana-admin
  namespace: monitoring
type: Opaque
stringData:
  admin-user: "admin"
  admin-password: "REPLACE_ME_HEX_16"
---
apiVersion: v1
kind: Secret
metadata:
  name: grafana-postgres
  namespace: monitoring
type: Opaque
stringData:
  GF_DATABASE_PASSWORD: "REPLACE_ME_HEX_16"
