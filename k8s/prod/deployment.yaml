apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-api
  namespace: chat-api
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: chat-api
  template:
    metadata:
      labels:
        app: chat-api
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      securityContext:
        # fsGroup 65533 = UID do git-sync. Kubelet aplica chgrp recursivo no
        # volume e injeta o GID como supplementary group em todos os containers
        # do Pod, permitindo que o app (UID diferente) leia o que o git-sync
        # escreve sem depender de bits "other".
        fsGroup: 65533
      volumes:
        - name: wiki
          persistentVolumeClaim:
            claimName: chat-api-wiki
        - name: db
          persistentVolumeClaim:
            claimName: chat-api-db
      initContainers:
        - name: wiki-prep
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              # Idempotente: garante /wiki/repo existindo e limpa qualquer
              # resíduo legado na raiz do PVC (do init wiki-clone antigo ou
              # de mudanças futuras no repo upstream). Blocklist preserva
              # apenas /wiki/repo e /wiki/lost+found.
              mkdir -p /wiki/repo
              for entry in /wiki/* /wiki/.[!.]*; do
                [ -e "$entry" ] || continue
                case "$entry" in
                  /wiki/repo|/wiki/lost+found) ;;
                  *)
                    echo "[wiki-prep] removing legacy $entry"
                    rm -rf "$entry"
                    ;;
                esac
              done
              chown -R 65533:65533 /wiki/repo
          volumeMounts:
            - name: wiki
              mountPath: /wiki
          securityContext:
            runAsUser: 0
        # Sidecar nativo (k8s >=1.29): restartPolicy: Always faz com que o
        # crash do git-sync NÃO derrube o Pod inteiro. O container inicia em
        # paralelo aos containers principais (não bloqueia readiness do app).
        - name: git-sync
          image: registry.k8s.io/git-sync/git-sync:v4.2.4
          restartPolicy: Always
          args:
            # --depth=1: wiki não precisa de histórico para servir conteúdo.
            # --period=60s: combina com WIKI_POLL_SECONDS do app.
            # --max-failures=3: tolera falhas transientes de rede/DNS.
            - --repo=https://github.com/leoferolive/leoferolive-wiki.git
            - --ref=main
            - --depth=1
            - --period=60s
            - --root=/wiki/repo
            - --link=current
            - --error-file=/wiki/repo/.git-sync-error
            - --http-bind=:9102
            - --max-failures=3
            - -v=2
          volumeMounts:
            - name: wiki
              mountPath: /wiki
          ports:
            - containerPort: 9102
              name: git-sync-http
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
          securityContext:
            runAsUser: 65533
            runAsNonRoot: true
            allowPrivilegeEscalation: false
          livenessProbe:
            httpGet:
              path: /
              port: 9102
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
      containers:
        - name: chat-api
          image: ghcr.io/leoferolive/chat-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: chat-api-config
            - secretRef:
                name: chat-api-secrets
          volumeMounts:
            - name: wiki
              mountPath: /wiki
              readOnly: true
            - name: db
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 15
