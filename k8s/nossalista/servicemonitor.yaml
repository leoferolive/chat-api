apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: nossalista
  namespace: nossalista
  labels:
    app: nossalista
    # Exigido pelo serviceMonitorSelector do kube-prometheus-stack (release=kps).
    release: kps
spec:
  selector:
    matchLabels:
      app: nossalista
  namespaceSelector:
    matchNames:
      - nossalista
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 30s
      scrapeTimeout: 10s
