apiVersion: v1
kind: ConfigMap
metadata:
  name: chat-api-config
  namespace: chat-api
data:
  ENV: "prod"
  ALLOWED_ORIGINS: "https://leoferolive.com.br"
  WIKI_DIR: "/wiki"
  DB_PATH: "/data/chat.sqlite"
  # Until a real Turnstile widget is provisioned for the prod hostname,
  # disable it. Re-enable by switching to "false" once TURNSTILE_SECRET
  # and the site key are populated.
  TURNSTILE_DISABLED: "true"
  SESSION_TTL_SECONDS: "3600"
  RATE_LIMIT_PER_IP: "10/5minutes"
  DAILY_LLM_CALL_LIMIT: "500"
  LLM_PROVIDERS: "gemini/gemini-2.5-flash,openrouter/deepseek/deepseek-v4-flash,openrouter/google/gemini-2.5-flash-lite"
  ZAI_BASE_URL: "https://api.z.ai/api/coding/paas/v4/"
  RETRIEVER_TOP_N: "5"
  WIKI_POLL_SECONDS: "60"
