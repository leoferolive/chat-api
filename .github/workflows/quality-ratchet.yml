name: Quality Ratchet Update

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: quality-ratchet-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ratchet:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.x"

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --all-extras

      - name: Update baseline
        run: bash scripts/update_baseline.sh
        env:
          ENV: ci
          TURNSTILE_DISABLED: "true"
          LLM_PROVIDERS: "mock/primary,mock/secondary"
          SESSION_SECRET: "ci-secret"
          IP_HASH_SALT: "ci-salt"

      - name: Check for changes
        id: check
        run: |
          if [ -n "$(git status --porcelain .quality/)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR with baseline update
        if: steps.check.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: quality/baseline-update-${{ github.sha }}
          title: "chore(quality): atualizar baseline do ratchet"
          body: |
            Atualização automática da baseline em `.quality/baseline.json`.
            Disparada por merge de ${{ github.event.head_commit.message }}.
          commit-message: "chore(quality): bump baseline do ratchet"
          delete-branch: true
          base: main
          add-paths: |
            .quality/baseline.json
