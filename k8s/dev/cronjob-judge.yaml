apiVersion: batch/v1
kind: CronJob
metadata:
  name: chat-api-judge
  namespace: chat-api-dev
spec:
  # Tight cadence in dev so a manual smoke test produces scores quickly.
  schedule: "*/10 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          # Same UID/GID as the main app, so we read/write the same SQLite
          # without permission shuffling.
          securityContext:
            fsGroup: 65533
          volumes:
            - name: db
              persistentVolumeClaim:
                claimName: chat-api-db
          containers:
            - name: judge
              image: ghcr.io/leoferolive/chat-api-dev:latest
              imagePullPolicy: Always
              command: ["python", "-m", "app.judge.cli", "--once", "--limit", "50"]
              envFrom:
                - configMapRef:
                    name: chat-api-config
                - secretRef:
                    name: chat-api-secrets
              volumeMounts:
                - name: db
                  mountPath: /data
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  cpu: 300m
                  memory: 256Mi
          imagePullSecrets:
            - name: ghcr-secret
