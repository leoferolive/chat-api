apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: chat-api
  namespace: chat-api-dev
  labels:
    app: chat-api-dev
    release: kps
spec:
  selector:
    matchLabels:
      app: chat-api-dev
  namespaceSelector:
    matchNames:
      - chat-api-dev
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
    - port: http
      path: /metrics-judge
      # Judge runs every 4h — no value scraping faster than once per minute.
      interval: 60s
      scrapeTimeout: 10s
    - port: http
      path: /metrics-traffic
      # Traffic gauges aggregate over 24h/7d/30d windows. Once per minute
      # is more than enough granularity.
      interval: 60s
      scrapeTimeout: 10s
