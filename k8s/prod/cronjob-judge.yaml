apiVersion: batch/v1
kind: CronJob
metadata:
  name: chat-api-judge
  namespace: chat-api-prod
spec:
  # Hourly in prod — cheaper, and a quality regression doesn't need <10min
  # detection latency when alerts also page on cost/error spikes.
  schedule: "0 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          securityContext:
            fsGroup: 65533
          volumes:
            - name: db
              persistentVolumeClaim:
                claimName: chat-api-db
          containers:
            - name: judge
              image: ghcr.io/leoferolive/chat-api:latest
              imagePullPolicy: Always
              command: ["python", "-m", "app.judge.cli", "--once", "--limit", "100"]
              envFrom:
                - configMapRef:
                    name: chat-api-config
                - secretRef:
                    name: chat-api-secrets
              volumeMounts:
                - name: db
                  mountPath: /data
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  cpu: 300m
                  memory: 256Mi
          imagePullSecrets:
            - name: ghcr-secret
