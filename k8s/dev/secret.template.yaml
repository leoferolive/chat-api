# Template only — DO NOT apply this file. Real secrets must be created
# out-of-band via `kubectl create secret`. Example:
#
#   kubectl create secret generic chat-api-secrets \
#     --namespace chat-api-dev \
#     --from-literal=TURNSTILE_SECRET=... \
#     --from-literal=SESSION_SECRET=$(openssl rand -hex 32) \
#     --from-literal=IP_HASH_SALT=$(openssl rand -hex 16) \
#     --from-literal=GEMINI_API_KEY=... \
#     --from-literal=OPENROUTER_API_KEY=... \
#     --from-literal=ZAI_API_KEY=...
#
# Rotation: `kubectl edit secret chat-api-secrets -n chat-api-dev` then
# `kubectl rollout restart deployment/chat-api-dev -n chat-api-dev`.
apiVersion: v1
kind: Secret
metadata:
  name: chat-api-secrets
  namespace: chat-api-dev
type: Opaque
stringData:
  TURNSTILE_SECRET: "REPLACE_ME"
  SESSION_SECRET: "REPLACE_ME_HEX_32"
  IP_HASH_SALT: "REPLACE_ME_HEX_16"
  GEMINI_API_KEY: "REPLACE_ME"
  OPENROUTER_API_KEY: "REPLACE_ME"
  ZAI_API_KEY: "REPLACE_ME"
